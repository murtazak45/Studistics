{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">

    <div class="w-full max-w-md bg-white border border-gray-200 rounded-xl shadow-sm p-8">

        <!-- Heading -->
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">
                Login to Studistics
            </h2>
            <p class="text-sm text-gray-500 mt-2">
                Enter your credentials to continue.
            </p>
        </div>

        <!-- Error Messages -->
        {% if form.errors %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">
                Invalid username or password. Please try again.
            </div>
        {% endif %}

        <!-- Login Form -->
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Username
                </label>
                <input type="text"
                       name="username"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input type="password"
                       name="password"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
                Login
            </button>

        </form>

        <!-- Footer Links -->
        <div class="mt-6 text-center text-sm text-gray-600">

            <a href="{% url 'password_reset' %}"
               class="text-indigo-600 hover:underline">
                Forgot Password?
            </a>

            <p class="mt-3">
                Don’t have an account?
                <a href="{% url 'signup' %}"
                   class="text-indigo-600 hover:underline font-medium">
                    Sign Up
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
