{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">

    <div class="w-full max-w-md bg-white border border-gray-200 rounded-xl shadow-sm p-8 text-center">

        <!-- Heading -->
        <h2 class="text-2xl font-bold text-gray-800">
            Password Reset Successful
        </h2>

        <p class="text-sm text-gray-600 mt-4">
            Your password has been successfully updated.
        </p>

        <p class="text-sm text-gray-500 mt-2">
            You can now log in using your new credentials.
        </p>

        <!-- Login Button -->
        <div class="mt-6">
            <a href="{% url 'login' %}"
               class="inline-block bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
                Go to Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
