{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">

    <div class="w-full max-w-md bg-white border border-gray-200 rounded-xl shadow-sm p-8">

        <!-- Heading -->
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">
                Reset Your Password
            </h2>
            <p class="text-sm text-gray-500 mt-2">
                Enter your registered email address to receive reset instructions.
            </p>
        </div>

        <!-- Form Errors -->
        {% if form.errors %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">
                Please enter a valid email address.
            </div>
        {% endif %}

        <!-- Reset Form -->
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Email Address
                </label>
                <input type="email"
                       name="email"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
                Send Reset Link
            </button>

        </form>

        <!-- Back to Login -->
        <div class="mt-6 text-center text-sm text-gray-600">
            <a href="{% url 'login' %}"
               class="text-indigo-600 hover:underline">
                Back to Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
