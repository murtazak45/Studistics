{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">

    <div class="w-full max-w-md bg-white border border-gray-200 rounded-xl shadow-sm p-8">

        <!-- Heading -->
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">
                Create an Account
            </h2>
            <p class="text-sm text-gray-500 mt-2">
                Sign up to start planning your studies.
            </p>
        </div>

        <!-- Form Errors -->
        {% if errors %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">
                <ul class="list-disc list-inside">
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <!-- Signup Form -->
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- Full Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Full Name
                </label>
                <input type="text"
                       name="name"
                       value="{{ name }}"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Email
                </label>
                <input type="email"
                       name="email"
                       value="{{ email }}"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input type="password"
                       name="password"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Confirm Password
                </label>
                <input type="password"
                       name="confirmPassword"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
                Create Account
            </button>

        </form>

        <!-- Footer -->
        <div class="mt-6 text-center text-sm text-gray-600">
            Already have an account?
            <a href="{% url 'login' %}"
               class="text-indigo-600 hover:underline font-medium">
                Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
