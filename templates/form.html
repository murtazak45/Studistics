{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <!-- Page Header -->
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">
            {{ page_title }}
        </h2>
        {% if page_subtitle %}
        <p class="text-gray-500 mt-2">
            {{ page_subtitle }}
        </p>
        {% endif %}
    </div>

    <!-- Form Container -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <!-- Render entire form dynamically + beautifully -->
            {{ form|crispy }}

            <!-- Buttons -->
            <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                <a href="{% url 'dashboard' %}"
                    class="px-6 py-2 text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition font-medium">
                    Cancel
                </a>
                <button type="submit"
                    class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">
                    {{ submit_btn_text|default:"Save" }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
